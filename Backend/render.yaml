services:
  - type: web
    name: visioncaption-ai-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: standard
    region: oregon
    healthCheckPath: /api/v1/health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://visioncaption.ai","https://www.visioncaption.ai"]'
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./visioncaption.db
      - key: MODEL_NAME
        value: Salesforce/blip-image-captioning-base
      - key: MODEL_CACHE_DIR
        value: /app/model_cache
      - key: MODEL_DEVICE
        value: cpu
      - key: OCR_MODEL_NAME
        value: microsoft/trocr-base-printed
      - key: ENABLE_OCR
        value: true
      - key: DETECTION_MODEL_NAME
        value: facebook/detr-resnet-50
      - key: ENABLE_OBJECT_DETECTION
        value: true
      - key: LOG_LEVEL
        value: INFO
    disk:
      name: model-cache
      mountPath: /app/model_cache
      sizeGB: 5